<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ngân hàng câu hỏi ôn tập Toán THPT</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #eef5ff, #ffffff);
      color: #1f2937;
    }
    .banner {
      background: linear-gradient(135deg, #1d4ed8, #2563eb, #60a5fa);
      color: white;
      padding: 40px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .banner::before, .banner::after {
      content: "∫  π  Σ  √x  f(x)  Δ";
      position: absolute;
      font-size: 28px;
      opacity: 0.15;
      letter-spacing: 18px;
      white-space: nowrap;
    }
    .banner::before { top: 15px; left: 20px; }
    .banner::after { bottom: 15px; right: 20px; }
    .banner h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.4;
      max-width: 1100px;
      margin-inline: auto;
      text-transform: uppercase;
    }
    .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
    .topics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
    }
    .topic-card {
      background: white;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      border: 1px solid #dbeafe;
    }
    .topic-header {
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
    }
    .topic-number {
      width: 46px; height: 46px; min-width: 46px;
      border-radius: 12px; background: #2563eb; color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 18px;
    }
    .topic-title { font-size: 18px; line-height: 1.5; font-weight: 600; }
    .topic-options {
      display: none;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid #dbeafe;
      gap: 10px;
      flex-wrap: wrap;
    }
    .topic-options.show { display: flex; }
    .option-btn {
      flex: 1;
      min-width: 140px;
      text-align: center;
      text-decoration: none;
      background: #eff6ff;
      color: #1d4ed8;
      padding: 12px 14px;
      border-radius: 12px;
      font-weight: 600;
      border: 1px solid #bfdbfe;
    }
    .option-btn:hover { background: #dbeafe; }
    footer {
      margin-top: 50px; background: #1e3a8a; color: white;
      text-align: center; padding: 30px 20px; line-height: 1.8;
      font-size: 18px; font-weight: 600;
    }
  </style>
</head>
<body>
  <header class="banner">
    <h1>NGÂN HÀNG CÂU HỎI ÔN TẬP THI TỐT NGHIỆP THPT MÔN TOÁN THEO CHỦ ĐỀ</h1>
  </header>

  <main class="container">
    <div class="topics-grid">
      <script>
        const topics = [
          'Ứng dụng đạo hàm và khảo sát hàm số','Thống kê','Vectơ trong không gian','Nguyên hàm, tích phân, ứng dụng','Phương pháp tọa độ trong không gian','Xác suất','Hình học không gian','Dãy số - Cấp số cộng - Cấp số nhân','Lượng giác','Lý thuyết đồ thị','Phương trình, bất phương trình'
        ];
        document.write(topics.map((title, i) => `
          <div class="topic-card">
            <div class="topic-header" onclick="toggleOptions(${i+1})">
              <div class="topic-number">${i+1}</div>
              <div class="topic-title">${title}</div>
            </div>
            <div class="topic-options" id="options-${i+1}">
              <a class="option-btn" href="ly_thuyet_${i+1}.pdf" target="_blank">📘 Xem lại lý thuyết</a>
              <a class="option-btn" href="chu_de_${i+1}.pdf" target="_blank">✍️ Giải bài tập</a>
            </div>
          </div>
        `).join(''));
      </script>
    </div>
  </main>

  <script>
    function toggleOptions(id) {
      document.getElementById(`options-${id}`).classList.toggle('show');
    }
  </script>

  <footer>
    <div>ÔN TẬP THI TỐT NGHIỆP THPT THEO LỘ TRÌNH CÁ NHÂN HÓA</div>
    <div>CÔ PHAN HỒNG HUỆ</div>
    <div>TRƯỜNG THPT ANH HÙNG NÚP</div>
  </footer>
</body>
</html>
